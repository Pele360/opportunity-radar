name: Weekly opportunity scan

on:
  schedule:
      - cron: "0 8 * * 1"
        workflow_dispatch: {}

        permissions:
          contents: write

          jobs:
            scan:
                runs-on: ubuntu-latest
                    steps:
                          - uses: actions/checkout@v4

                                - uses: actions/setup-python@v5
                                        with:
                                                  python-version: "3.12"

                                                        - name: Install dependencies
                                                                run: pip install requests

                                                                      - name: Run scanner and rebuild site
                                                                              env:
                                                                                        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                run: |
                                                                                                          python scanner.py
                                                                                                                    python generate_site.py
                                                                                                                    
                                                                                                                          - name: Commit and publish updated report
                                                                                                                                  run: |
                                                                                                                                            git config user.name "opportunity-radar-bot"
                                                                                                                                                      git config user.email "actions@github.com"
                                                                                                                                                                git add -A
                                                                                                                                                                          git diff --staged --quiet || git commit -m "Weekly scan"
                                                                                                                                                                                    git push
                                                                                                                                                                                    
